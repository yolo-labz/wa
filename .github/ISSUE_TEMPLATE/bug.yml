name: Bug report
description: Something is broken in wa or wad
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Steps to reproduce, expected vs actual
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: wa version
      placeholder: "wa --version output"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: OS
      options: [macOS arm64, macOS x86_64, Linux amd64, Linux arm64, Other]
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: shell
