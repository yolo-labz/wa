name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# All jobs target the self-hosted runner pool (label set
# [self-hosted, dokku]). The sonar job additionally requires the
# `sonar` label to land on a runner that has SonarScanner pre-
# installed. If you want to bring up a second runner with identical
# labels, register it with both `self-hosted` and `dokku` and the
# jobs below will schedule onto whichever is free.
#
# Note: commitlint and detect are lightweight enough to run on the
# same pool. Having a single runner class simplifies secret and
# cache management.

jobs:
  detect:
    runs-on: [self-hosted, dokku]
    outputs:
      has_go: ${{ steps.check.outputs.has_go }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          if [ -f go.mod ]; then
            echo "has_go=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_go=false" >> "$GITHUB_OUTPUT"
          fi

  lint:
    needs: detect
    runs-on: [self-hosted, dokku]
    steps:
      - uses: actions/checkout@v4
      - if: needs.detect.outputs.has_go == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: "stable"
          cache: true
      - if: needs.detect.outputs.has_go == 'true'
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
      - if: needs.detect.outputs.has_go != 'true'
        run: echo "no go.mod yet — skipping lint"

  test:
    needs: detect
    runs-on: [self-hosted, dokku]
    steps:
      - uses: actions/checkout@v4
      - if: needs.detect.outputs.has_go == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: "stable"
          cache: true
      - if: needs.detect.outputs.has_go == 'true'
        name: go test
        run: go test -race -covermode=atomic -coverprofile=cover.out ./...
      - if: needs.detect.outputs.has_go == 'true'
        name: upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: cover-out
          path: cover.out
          retention-days: 1
      - if: needs.detect.outputs.has_go != 'true'
        run: echo "no go.mod yet — skipping tests"

  sonar:
    needs: [detect, test]
    if: needs.detect.outputs.has_go == 'true'
    runs-on: [self-hosted, dokku, sonar]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: download coverage
        uses: actions/download-artifact@v4
        with:
          name: cover-out
      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  govulncheck:
    needs: detect
    runs-on: [self-hosted, dokku]
    steps:
      - uses: actions/checkout@v4
      - if: needs.detect.outputs.has_go == 'true'
        uses: golang/govulncheck-action@v1
        with:
          go-version-input: "stable"
          check-latest: true
      - if: needs.detect.outputs.has_go != 'true'
        run: echo "no go.mod yet — skipping govulncheck"

  # Nix flake check — validates the flake shape (outputs, checks,
  # overlays, nixosModules, home-manager modules) and the actual
  # package builds via buildGoModule. This guards against two
  # classes of breakage:
  #
  #   1. Schema drift on flake outputs (e.g. renaming an attr).
  #   2. go.sum / vendorHash divergence — the build fails fast on any
  #      dependency bump that wasn't accompanied by a matching flake
  #      update.
  #
  # The job runs on a self-hosted runner that already has Nix
  # installed (the NixOS/nix-darwin host). A GitHub-hosted runner
  # would need DeterminateSystems/nix-installer-action which adds
  # 15-30s of setup per run.
  nix:
    needs: detect
    if: needs.detect.outputs.has_go == 'true'
    runs-on: [self-hosted, dokku]
    steps:
      - uses: actions/checkout@v4
      - name: nix flake check
        run: |
          nix flake check --no-build --accept-flake-config
      - name: nix build .#default
        run: |
          nix build .#default --print-build-logs --accept-flake-config
      - name: smoke test
        run: |
          ./result/bin/wa version
          ./result/bin/wa --help | head -5

  commitlint:
    runs-on: [self-hosted, dokku]
    if: github.event_name == 'pull_request'
    env:
      PR_TITLE: ${{ github.event.pull_request.title }}
    steps:
      - name: validate PR title (squash-merge subject)
        run: |
          subject="$PR_TITLE"
          if ! [[ "$subject" =~ ^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-z0-9._/,-]+\))?!?:\ .+ ]]; then
            echo "::error::PR title does not follow Conventional Commits: $subject"
            exit 1
          fi
          if [ ${#subject} -gt 72 ]; then
            echo "::error::PR title is ${#subject} chars; keep it <=72: $subject"
            exit 1
          fi
          echo "ok: $subject"
