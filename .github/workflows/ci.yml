name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      has_go: ${{ steps.check.outputs.has_go }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          if [ -f go.mod ]; then
            echo "has_go=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_go=false" >> "$GITHUB_OUTPUT"
          fi

  lint:
    needs: detect
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - if: needs.detect.outputs.has_go == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: "stable"
          cache: true
      - if: needs.detect.outputs.has_go == 'true'
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
      - if: needs.detect.outputs.has_go != 'true'
        run: echo "no go.mod yet — skipping lint"

  test:
    needs: detect
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - if: needs.detect.outputs.has_go == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: "stable"
          cache: true
      - if: needs.detect.outputs.has_go == 'true'
        name: go test
        run: go test -race -covermode=atomic -coverprofile=cover.out ./...
      - if: needs.detect.outputs.has_go == 'true'
        name: upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./cover.out
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      - if: needs.detect.outputs.has_go != 'true'
        run: echo "no go.mod yet — skipping tests"

  govulncheck:
    needs: detect
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - if: needs.detect.outputs.has_go == 'true'
        uses: golang/govulncheck-action@v1
        with:
          go-version-input: "stable"
          check-latest: true
      - if: needs.detect.outputs.has_go != 'true'
        run: echo "no go.mod yet — skipping govulncheck"

  commitlint:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: validate PR commits
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          fail=0
          for sha in $(git rev-list "$base..$head"); do
            subject=$(git log -1 --format=%s "$sha")
            if ! [[ "$subject" =~ ^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-z0-9._/-]+\))?!?:\ .+ ]]; then
              echo "::error::commit $sha does not follow Conventional Commits: $subject"
              fail=1
            fi
            if [ ${#subject} -gt 72 ]; then
              echo "::error::commit $sha subject >72 chars: $subject"
              fail=1
            fi
          done
          exit $fail
