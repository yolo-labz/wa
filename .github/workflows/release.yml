name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Install rcodesign
        run: |
          curl -sSL \
            https://github.com/indygreg/apple-platform-rs/releases/download/apple-codesign%2F0.29.0/apple-codesign-0.29.0-x86_64-unknown-linux-musl.tar.gz \
            | tar -xz --strip-components=1 -C /usr/local/bin

      - name: Decode Apple credentials
        # Secrets are base64-encoded PEM/P8 files. Decode them to /tmp
        # so goreleaser hooks and notary-submit can reference local paths.
        env:
          APPLE_CERT: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERT }}
          APPLE_KEY: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_KEY }}
          APPLE_P8: ${{ secrets.APPLE_API_KEY }}
        run: |
          echo "$APPLE_CERT" | base64 -d > /tmp/cert.pem
          echo "$APPLE_KEY" | base64 -d > /tmp/key.pem
          echo "$APPLE_P8" | base64 -d > /tmp/api.p8

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          APPLE_API_KEY_PATH: /tmp/api.p8
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          RCODESIGN_PEM_CERT: /tmp/cert.pem
          RCODESIGN_PEM_KEY: /tmp/key.pem

      - name: Generate CHANGELOG
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          pip install git-cliff || true
          git-cliff -o CHANGELOG.md

      - name: Commit CHANGELOG
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet || git commit -m "docs: update CHANGELOG for $TAG_NAME"
          git push origin HEAD:main
