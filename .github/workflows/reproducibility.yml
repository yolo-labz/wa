name: Reproducibility

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-twice:
    name: Reproducible build check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: stable

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6.4.0
        with:
          version: v2.5.1
          install-only: true

      - name: First build (snapshot)
        run: |
          export SOURCE_DATE_EPOCH=$(git log -1 --format=%ct)
          goreleaser release --snapshot --clean
          cp -r dist /tmp/dist-1

      - name: Second build (snapshot, fresh mtimes)
        run: |
          export SOURCE_DATE_EPOCH=$(git log -1 --format=%ct)
          sleep 2
          find . -type f -not -path "./.git/*" -exec touch {} + || true
          goreleaser release --snapshot --clean
          cp -r dist /tmp/dist-2

      - name: Compare checksums
        run: |
          sha1=$(sha256sum /tmp/dist-1/checksums.txt | awk '{print $1}')
          sha2=$(sha256sum /tmp/dist-2/checksums.txt | awk '{print $1}')
          echo "Build 1 checksums: $sha1"
          echo "Build 2 checksums: $sha2"
          if [ "$sha1" != "$sha2" ]; then
            echo "::error::Reproducibility broken — checksums differ"
            diff /tmp/dist-1/checksums.txt /tmp/dist-2/checksums.txt || true
            exit 1
          fi
          echo "PASS: byte-identical builds"

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: repro-debug
          path: |
            /tmp/dist-1/checksums.txt
            /tmp/dist-2/checksums.txt
          retention-days: 5
