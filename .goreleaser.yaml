version: 2
project_name: wa

before:
  hooks:
    - go mod tidy

builds:
  - id: wa
    main: ./cmd/wa
    binary: wa
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ignore:
      - goos: darwin
        goarch: amd64
    flags: [-trimpath]
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.CommitDate}}
    mod_timestamp: '{{ .CommitTimestamp }}'
    # rcodesign post-build hook for darwin binaries.
    # The hook only runs when RCODESIGN_PEM_CERT and RCODESIGN_PEM_KEY are set
    # (i.e. in CI after the "Decode Apple credentials" step).
    # Locally, goreleaser release --snapshot skips hooks that reference
    # missing env vars — no action needed for local dev.
    hooks:
      post:
        - cmd: >-
            {{- if eq .Os "darwin" }}
            rcodesign sign
            --code-signature-flags runtime
            --pem-source {{ .Env.RCODESIGN_PEM_CERT }}
            --pem-source {{ .Env.RCODESIGN_PEM_KEY }}
            {{ .Path }}
            {{- end }}
          output: true

  - id: wad
    main: ./cmd/wad
    binary: wad
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ignore:
      - goos: darwin
        goarch: amd64
    flags: [-trimpath]
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
    mod_timestamp: '{{ .CommitTimestamp }}'
    hooks:
      post:
        - cmd: >-
            {{- if eq .Os "darwin" }}
            rcodesign sign
            --code-signature-flags runtime
            --pem-source {{ .Env.RCODESIGN_PEM_CERT }}
            --pem-source {{ .Env.RCODESIGN_PEM_KEY }}
            {{ .Path }}
            {{- end }}
          output: true

archives:
  - id: default
    ids: [wa, wad]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]

checksum:
  name_template: checksums.txt
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude: ['^docs:', '^test:', '^chore:']

release:
  github:
    owner: yolo-labz
    name: wa
  draft: false
  prerelease: auto

brews:
  - name: wa
    repository:
      owner: yolo-labz
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/yolo-labz/wa"
    description: "WhatsApp automation CLI + daemon"
    license: "Apache-2.0"
    install: |
      bin.install "wa"
      bin.install "wad"
    test: |
      system "#{bin}/wa", "--version"
